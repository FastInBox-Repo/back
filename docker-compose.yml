services:
  postgres:
    image: postgres:17
    container_name: postgres-fastinbox-container
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fastinbox
    ports:
      - '5451:5432'
    volumes:
      - postgres_fastinbox_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: redis-fastinbox-container
    restart: no
    ports:
      - '6380:6379'
    volumes:
      - redis_fastinbox_data:/data

volumes:
  postgres_fastinbox_data:
  redis_fastinbox_data:
